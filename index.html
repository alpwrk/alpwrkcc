<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alpwrk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #f0f0f0;
    --tag-bg: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 60px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .projects-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .project-card {
    background: var(--bg);
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 10px 20px;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
    cursor: default;
  }

  .project-card:hover {
    background: var(--surface);
  }

  .project-card.has-link {
    cursor: pointer;
  }

  .project-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.01em;
    grid-column: 1;
    grid-row: 1;
  }

  .project-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-decoration: none;
    grid-column: 2;
    grid-row: 1;
    align-self: center;
    white-space: nowrap;
    transition: color 0.15s;
  }

  .project-link:hover { color: var(--accent); }

  .project-desc {
    font-size: 0.85rem;
    color: #888;
    line-height: 1.6;
    grid-column: 1 / 3;
    grid-row: 2;
  }

  .project-meta {
    grid-column: 1 / 3;
    grid-row: 3;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 3px 8px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: #666;
    letter-spacing: 0.04em;
  }

  .tag.lang {
    color: #999;
    border-color: #2a2a2a;
    background: #141414;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: auto;
  }
  .status-dot.active   { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
  .status-dot.wip      { background: #fbbf24; box-shadow: 0 0 6px #fbbf2466; }
  .status-dot.archived { background: #444; }

  footer {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    body { padding: 32px 20px; }
    .project-card { padding: 20px; grid-template-columns: 1fr; }
    .project-link { grid-column: 1; grid-row: auto; }
    .project-desc { grid-column: 1; }
    .project-meta { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>alpwrk</h1>
    <p style="margin-top:6px">code projects</p>
  </div>
  <p>2026</p>
</header>

<div class="projects-grid" id="grid">
  <div class="project-card" style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem">loading...</div>
</div>

<script>
// ─── KONFIGURATION ────────────────────────────────────────────
const GITHUB_USERNAME = 'alpwrk';

// Manuelle Website-Links pro Repo (repo-name: 'https://...')
const WEBSITE_LINKS = {
  // 'repo-name': 'https://deine-website.de',
};
// ─────────────────────────────────────────────────────────────

function getStatus(repo) {
  if (repo.archived) return 'archived';
  if (repo.topics && repo.topics.includes('wip')) return 'wip';
  return 'active';
}

function langColor(lang) {
  const map = {
    JavaScript: '#f7df1e', TypeScript: '#3178c6', Python: '#3572A5',
    Rust: '#dea584', Go: '#00ADD8', Java: '#b07219', 'C++': '#f34b7d',
    C: '#555555', HTML: '#e34c26', CSS: '#563d7c', Ruby: '#701516',
    Swift: '#F05138', Kotlin: '#A97BFF', Dart: '#00B4AB',
  };
  return map[lang] || '#666';
}

function langBar(langs) {
  const total = Object.values(langs).reduce((a, b) => a + b, 0);
  if (!total) return '';
  const segments = Object.entries(langs)
    .sort((a, b) => b[1] - a[1])
    .map(([lang, bytes]) => {
      const pct = (bytes / total * 100).toFixed(1);
      return `<span style="width:${pct}%;background:${langColor(lang)};height:100%;display:inline-block;" title="${lang} ${pct}%"></span>`;
    }).join('');
  const labels = Object.entries(langs)
    .sort((a, b) => b[1] - a[1])
    .map(([lang, bytes]) => {
      const pct = (bytes / total * 100).toFixed(1);
      return `<span class="tag lang" style="border-color:${langColor(lang)}33;color:${langColor(lang)}cc">
        <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${langColor(lang)};margin-right:4px;vertical-align:middle"></span>${lang} <span style="color:#444">${pct}%</span>
      </span>`;
    }).join('');
  return `
    <div style="width:100%;height:4px;border-radius:2px;overflow:hidden;display:flex;margin-bottom:8px;background:#1a1a1a">${segments}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${labels}</div>`;
}

async function loadRepos() {
  const grid = document.getElementById('grid');
  try {
    let page = 1, repos = [];
    while (true) {
      const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&page=${page}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      repos = repos.concat(data);
      if (data.length < 100) break;
      page++;
    }

    repos.sort((a, b) => {
      if (a.archived !== b.archived) return a.archived ? 1 : -1;
      return new Date(b.pushed_at) - new Date(a.pushed_at);
    });

    // Alle Sprachen parallel laden
    const langData = await Promise.all(
      repos.map(r => fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${r.name}/languages`).then(r => r.json()).catch(() => ({})))
    );

    grid.innerHTML = repos.map((repo, i) => {
      const status = getStatus(repo);
      const websiteUrl = WEBSITE_LINKS[repo.name];
      const topics = (repo.topics || []).filter(t => t !== 'wip');
      const langs = langData[i] || {};
      const created = new Date(repo.created_at).toLocaleDateString('de-DE');

      return `
        <div class="project-card" onclick="window.open('${websiteUrl || repo.html_url}','_blank')" style="cursor:pointer">
          <span class="project-name">${repo.name}</span>
          <span style="display:flex;align-items:center;gap:18px;grid-column:2;grid-row:1">
            ${websiteUrl
              ? `<a class="project-link" href="${websiteUrl}" target="_blank" onclick="event.stopPropagation()">${new URL(websiteUrl).hostname} ↗</a>`
              : `<a class="project-link" href="${repo.html_url}" target="_blank" onclick="event.stopPropagation()">github ↗</a>`
            }
            <span class="status-dot ${status}"></span>
          </span>
          <span style="font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.04em;grid-column:2;grid-row:2;align-self:start;white-space:nowrap">CREATED ${created}</span>
          <p class="project-desc">${repo.description || '<span style="color:#333">NO DESCRIPTION</span>'}</p>
          <div class="project-meta">
            <div style="width:100%">${langBar(langs)}</div>
            ${topics.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>`;
    }).join('');

  } catch (e) {
    grid.innerHTML = `<div class="project-card" style="color:#e55;font-family:'DM Mono',monospace;font-size:0.8rem">
      fehler beim laden — username korrekt? (${e.message})
    </div>`;
  }
}

loadRepos();
</script>

<footer>
  <span style="color:#4ade80">● active</span> &nbsp;
  <span style="color:#fbbf24">● work in progress</span> &nbsp;
  <span style="color:#444">● archived</span>
  <br><br>alpwrk.cc — 2026
</footer>

</body>
</html>
