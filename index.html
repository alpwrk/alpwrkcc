<!DOCTYPE html>
<html lang="en" data-theme="dark">

  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      document.documentElement.dataset.theme = prefersLight ? 'light' : 'dark';
    })();
  </script>
</head>

<img id="theme-hint" src="imgs/ttb.png" alt="try this" />

      <a onclick="go('projects')">code-projects</a>
      <a href="https://github.com/alpwrk" target="_blank" rel="noopener">github</a>
    </nav>
  </div>
</div>

<div id="projects" class="page">
  <div class="projects-inner">
    <header>
      <div>
        <h1>alpwrk</h1>

      </div>
      <a class="back-link" onclick="go('home')">← back</a>

    <div class="projects-grid" id="grid">
      <div class="project-card" style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem">loading...</div>

    <footer>

</html>
